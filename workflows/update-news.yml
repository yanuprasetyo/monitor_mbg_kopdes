name: Update Berita Monitor MBG

on:
  schedule:
    - cron: "0 */6 * * *"   # Setiap 6 jam (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # Bisa dijalankan manual kapan saja

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch & akumulasi berita
        run: python scripts/fetch_news.py

      - name: Commit & push jika ada perubahan
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/news.json
          git diff --cached --quiet || git commit -m "chore: update berita $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
